<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Reading Assistant</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <h1>✨ AI 阅读助手</h1>
      <p class="subtitle">选中文字 → AI 帮你总结 / 解释 / 翻译</p>
    </header>

    <!-- Status -->
    <div class="status-bar" id="statusBar">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">未配置 API Key</span>
    </div>

    <!-- Usage -->
    <div class="usage-card" id="usageCard">
      <div class="usage-label">今日免费次数</div>
      <div class="usage-bar-track">
        <div class="usage-bar-fill" id="usageBarFill"></div>
      </div>
      <div class="usage-text" id="usageText">0 / 10</div>
    </div>

    <!-- Template guide (shown when no key) -->
    <div class="guide" id="guideBox">
      <h3>📖 两种使用方式</h3>
      <div class="guide-options">
        <div class="guide-option">
          <strong>方式一：用自己的 Key（推荐）</strong>
          <p>无限使用，数据不经过第三方服务器，最安全。</p>
          <p class="hint">
            OpenAI Key → <a href="https://platform.openai.com/api-keys" target="_blank">获取</a>
            (新用户有免费额度)<br>
            Claude Key → <a href="https://console.anthropic.com/" target="_blank">获取</a>
          </p>
        </div>
        <div class="guide-option">
          <strong>方式二：免费试用</strong>
          <p>每天 10 次，无需配置（暂未开放，请先用自己的 Key）</p>
        </div>
      </div>
    </div>

    <!-- Settings -->
    <div class="settings">
      <div class="form-group">
        <label for="provider">AI 服务商</label>
        <select id="provider">
          <option value="openai">OpenAI (GPT-4o-mini)</option>
          <option value="claude">Claude (Sonnet 4.6)</option>
        </select>
      </div>
      <div class="form-group">
        <label for="apiKey">API Key</label>
        <div class="input-row">
          <input type="password" id="apiKey" placeholder="sk-... 或 sk-ant-...">
          <button id="toggleKey" title="显示/隐藏">👁️</button>
        </div>
      </div>
      <div class="form-group">
        <label for="language">默认语言</label>
        <select id="language">
          <option value="zh-CN">中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
        </select>
      </div>
      <button id="saveBtn">💾 保存设置</button>
      <div class="save-status" id="saveStatus"></div>
    </div>

    <!-- Footer -->
    <footer>
      <span>v1.0.0</span>
      <span>选中文字 → 右键 → AI 助手</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
